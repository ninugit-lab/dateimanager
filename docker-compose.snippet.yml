# Service-Snippet zum Einfügen in das Orchestrator-Compose (VibeCodedAdministration).
# Ersetzt dort den nginx-Platzhalter "team2-dateimanagement".
# Annahme: gemeinsames Traefik-Gateway + letsencrypt-Certresolver wie im Orchestrator.

networks:
  cpp-edge:
    external: true

  files-db:
    image: postgres:16-alpine
    container_name: files-db
    environment:
      POSTGRES_USER: ${FILES_PG_USER:-files}
      POSTGRES_PASSWORD: ${FILES_PG_PASS}
      POSTGRES_DB: ${FILES_PG_DB:-files}
    volumes:
      - files-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  team2-backend:
    build:
      context: ./team2-dateimanagement
      dockerfile: Dockerfile
    container_name: team2-backend
    environment:
      PORT: 8002
      PGHOST: files-db
      PGUSER: ${FILES_PG_USER:-files}
      PGPASSWORD: ${FILES_PG_PASS}
      PGDATABASE: ${FILES_PG_DB:-files}
      STORAGE_DIR: /data/files
      AUTH_JWKS_URL: ${AUTH_JWKS_URL}
      AUTH_ISSUER: ${AUTH_ISSUER}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE}
      AUTH_ALLOW_DEV_HEADER: "false"
    volumes:
      - files-storage:/data/files
    depends_on:
      - files-db
    restart: unless-stopped

  team2-frontend:
    build:
      context: ./team2-dateimanagement
      dockerfile: Dockerfile.frontend
    container_name: team2-frontend
    volumes:
      - ./shared-styles:/shared-styles:ro
    depends_on:
      - team2-backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.team2.rule=PathPrefix(`/`)
      - traefik.http.routers.team2.tls.certresolver=letsencrypt
      - traefik.http.services.team2.loadbalancer.server.port=80
    restart: unless-stopped

volumes:
  files-db-data:
  files-storage:
