# Stack: Backend + Frontend + DB.
# Das Frontend ist der Einstiegspunkt, proxied /api/files ans Backend.

networks:
  cpp-edge:
    external: true
    name: cpp-edge
  internal:

services:
  files-db:
    image: postgres:16-alpine
    container_name: files-db
    environment:
      POSTGRES_USER: ${PGUSER:-files}
      POSTGRES_PASSWORD: ${PGPASSWORD:-files}
      POSTGRES_DB: ${PGDATABASE:-files}
    volumes:
      - files-db-data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  team2-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: team2-backend
    environment:
      PORT: 8002
      PGHOST: files-db
      PGUSER: ${PGUSER:-files}
      PGPASSWORD: ${PGPASSWORD:-files}
      PGDATABASE: ${PGDATABASE:-files}
      STORAGE_DIR: /data/files
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-http://authentik-server:9000/auth/application/o/cpp/jwks/}
      AUTH_ISSUER: ${AUTH_ISSUER:-}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE:-}
      AUTH_SUBJECT_CLAIM: ${AUTH_SUBJECT_CLAIM:-sub}
      AUTH_ALLOW_DEV_HEADER: ${AUTH_ALLOW_DEV_HEADER:-true}
    volumes:
      - files-storage:/data/files
    networks:
      - internal
      - cpp-edge
    depends_on:
      - files-db
    restart: unless-stopped

  team2-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: team2-frontend
    environment:
      - BACKEND_HOST=team2-backend
      - BACKEND_PORT=8002
    volumes:
      - ../:/shared-styles:ro
    ports:
      - "8002:80"
    networks:
      - cpp-edge
    depends_on:
      - team2-backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.team2.rule=PathPrefix(`/`)
      - traefik.http.services.team2.loadbalancer.server.port=80
    restart: unless-stopped

volumes:
  files-db-data:
  files-storage:
