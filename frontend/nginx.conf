# Nginx-Konfiguration für das Frontend-Container.
# Dient das SPA aus, proxied /api/files ans Backend und /styles ins Volume.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # DNS-Resolver für dynamische Host-Auflösung (Docker-Netzwerk)
    resolver 127.0.0.11 valid=10s;

    # API-Proxy → Backend-Container.
    # Variable in proxy_pass nötig, damit Nginx den Host nicht beim Start
    # validiert (Docker-Netzwerk). Der gesamte URI (inkl. /api/files-Prefix)
    # wird an den Backend-Proxy durchgereicht.
    location /api/files {
        set $backend "http://team2-backend:8002";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 200M;
    }

    # Gemeinsames Stylesheet (vom Gateway gemountet)
    location /styles/ {
        alias /shared-styles/;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA — alle anderen Pfade → index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }
}
